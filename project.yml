# =========================================================================
# STALE — DO NOT REGENERATE FROM THIS FILE.
#
# This project has moved away from XcodeGen. The authoritative project
# definition lives in WaterQuest.xcodeproj/project.pbxproj, which is
# edited directly (see scripts/add_test_target.rb and add_files.rb for
# the pattern using the `xcodeproj` Ruby gem).
#
# Running `xcodegen generate` against this file will silently delete:
#   - SipliWatch target
#   - SipliWidget target
#   - SipliWatchWidgetsExtension target
#   - WaterQuestTests target
# and will rename the shipping app from `Sipli` back to `Thirsty.ai`.
#
# This file is kept only as a historical artifact. To add or modify
# targets, write a Ruby script under `scripts/` instead.
# =========================================================================
name: Thirsty.ai
options:
  bundleIdPrefix: com.waterquest
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: WaterQuest/Supporting/Info.plist
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # Earth Day 2026 alternate app icon. Once WaterQuest/EarthDayIcon.icon/
    # exists with artwork, uncomment the line below and flip
    # EarthDayEvent.alternateIconAvailable to true to expose the Settings
    # toggle for the green Earth Day icon variant.
    # ASSETCATALOG_COMPILER_ALTERNATE_APP_ICON_NAMES: EarthDayIcon

targets:
  WaterQuest:
    type: application
    platform: iOS
    sources:
      - WaterQuest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.waterquest.hydration
        PRODUCT_NAME: Thirsty.ai
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 2.1
        CODE_SIGN_ENTITLEMENTS: WaterQuest/Supporting/WaterQuest.entitlements
