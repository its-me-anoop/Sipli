apiVersion: ssu/v1
nlu:
  shortcuts:
    bundleIdentifier: com.waterquest.hydration
    intents:
    - metadata:
        name: LogWaterIntent_0
        title: Log Water
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }Log water in ${+applicationName}'
          - '{${+prefix} }Log a drink in ${+applicationName}'
          - '{${+prefix} }Add water in ${+applicationName}'
    - metadata:
        name: GetTodaysHydrationIntent_1
        title: Get Today's Hydration
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }How much water have I had in ${+applicationName}'
          - '{${+prefix} }What''s my hydration in ${+applicationName}'
          - '{${+prefix} }Check my water in ${+applicationName}'
    - metadata:
        name: OpenSipliIntent_2
        title: Open Sipli
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }Open ${+applicationName}'
    - metadata:
        name: +negative
      corpuses:
        training:
        - locale: en
          utterances:
          - '{${+prefix} }${+standardAppShortcutNegatives}'
variables:
- name: +applicationName
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
    - Sipli
- name: FluidTypeAppEnum
  type: ssu/parameter
  definitions:
  - locale: en
    synomyms:
    - Water
    - Sparkling Water
    - Coconut Water
    - Herbal Tea
    - Green Tea
    - Black Tea
    - Earl Grey
    - Chamomile
    - Peppermint
    - Matcha
    - Oolong
    - Chai
    - Rooibos
    - Tea
    - Milk
    - Juice
    - Lemonade
    - Smoothie
    - Sports Drink
    - Espresso
    - Americano
    - Latte
    - Cappuccino
    - Flat White
    - Mocha
    - Iced Coffee
    - Cold Brew
    - Macchiato
    - Coffee
    - Soda
    - Energy Drink
    - Soup
    - Beer
    - Wine
    - Cocktail
    - Other
- name: +prefix
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
      $ref: ssu://Resources/prefix/en.yaml
- name: +standardAppShortcutNegatives
  type: ssu/expansion
  definitions:
  - locale: en
    synomyms:
      $ref: ssu://Resources/standardAppShortcutNegatives/en.yaml
