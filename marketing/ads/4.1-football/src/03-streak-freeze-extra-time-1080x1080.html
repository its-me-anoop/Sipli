<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sipli 4.1 — Streak Freeze extra time (1080x1080)</title>
<style>
  html,body{margin:0;padding:0;width:1080px;height:1080px;overflow:hidden;
    font-family:'Liberation Sans',-apple-system,"SF Pro Display","Helvetica Neue",Arial,sans-serif;}
  #ad{position:relative;width:1080px;height:1080px;overflow:hidden;color:#fff;
    background:linear-gradient(160deg,#0A3D91 0%,#1C78F5 62%,#30C2A3 130%);}
  #ad::before{content:"";position:absolute;inset:-18% -10% auto -10%;height:60%;
    background:radial-gradient(ellipse at center top,rgba(255,255,255,.2),transparent 62%);pointer-events:none;}

  .brand{position:absolute;top:56px;left:64px;font-weight:700;font-size:56px;letter-spacing:-1.5px;}
  .brand .dot{display:inline-block;width:16px;height:16px;border-radius:50%;background:#30C2A3;margin-left:8px;vertical-align:middle;transform:translateY(-6px);}
  .newchip{position:absolute;top:62px;right:64px;height:56px;padding:0 26px;border-radius:999px;
    background:#30C2A3;color:#04314F;font-weight:700;font-size:24px;letter-spacing:1.5px;
    display:flex;align-items:center;box-shadow:0 10px 24px rgba(4,49,79,.35);}

  /* fourth-official substitution board */
  .boardwrap{position:absolute;top:190px;left:50%;transform:translateX(-50%);width:390px;text-align:center;}
  .board{position:relative;margin:0 auto;width:340px;height:300px;border-radius:36px;
    background:#041531;border:8px solid #0A2540;
    box-shadow:0 26px 60px rgba(3,20,50,.55),inset 0 0 46px rgba(28,120,245,.2);
    display:flex;align-items:center;justify-content:center;}
  .board .plus{font-family:'Liberation Mono','DejaVu Sans Mono',monospace;font-size:170px;font-weight:700;color:#FFB020;
    text-shadow:0 0 34px rgba(255,176,32,.8);letter-spacing:-6px;}
  .board .tag{position:absolute;bottom:20px;left:0;right:0;text-align:center;font-size:22px;font-weight:700;
    letter-spacing:5px;color:rgba(255,255,255,.75);}
  .handle{margin:0 auto;width:56px;height:70px;background:#0A2540;border-radius:0 0 20px 20px;}

  .headline{position:absolute;top:596px;left:64px;right:64px;text-align:center;
    font-size:86px;line-height:1.06;font-weight:700;letter-spacing:-2px;
    text-shadow:0 6px 24px rgba(6,42,102,.35);}
  .sub{position:absolute;top:806px;left:90px;right:90px;text-align:center;
    font-size:34px;line-height:1.35;color:rgba(255,255,255,.94);font-weight:500;}
  .sub b{color:#CFF6EC;}

  .cta{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);height:80px;padding:0 48px;border-radius:999px;
    background:#fff;color:#0A3D91;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:30px;box-shadow:0 16px 34px rgba(4,30,70,.45);white-space:nowrap;}
  .cta .arrow{margin-left:14px;color:#30C2A3;}

  .flake{position:absolute;font-size:52px;opacity:.85;}
</style>
</head>
<body>
<div id="ad">
  <div class="brand">Sipli<span class="dot"></span></div>
  <div class="newchip">NEW IN 4.1</div>

  <div class="flake" style="top:220px;left:150px;">&#10052;</div>
  <div class="flake" style="top:400px;left:250px;font-size:36px;opacity:.6;">&#10052;</div>
  <div class="flake" style="top:250px;right:160px;font-size:64px;">&#10052;</div>
  <div class="flake" style="top:440px;right:250px;font-size:34px;opacity:.6;">&#10052;</div>

  <div class="boardwrap">
    <div class="board">
      <div class="plus">+1</div>
      <div class="tag">STREAK FREEZE</div>
    </div>
    <div class="handle"></div>
  </div>

  <div class="headline">Missed a day?<br>You get extra time.</div>
  <div class="sub">Every 7-day streak banks a <b>Streak Freeze</b> (up to 3).<br>Miss a day and one is spent &mdash; your run plays on.</div>

  <div class="cta">Keep your streak alive &mdash; free on the App&nbsp;Store <span class="arrow">&rsaquo;</span></div>
</div>
</body>
</html>
