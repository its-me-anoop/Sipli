<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sipli 4.1 — Match Day hero (1080x1080)</title>
<style>
  html,body{margin:0;padding:0;width:1080px;height:1080px;overflow:hidden;
    font-family:'Liberation Sans',-apple-system,"SF Pro Display","Helvetica Neue",Arial,sans-serif;}
  #ad{position:relative;width:1080px;height:1080px;overflow:hidden;color:#fff;
    background:linear-gradient(165deg,#062A66 0%,#0A3D91 38%,#1C78F5 78%);}
  #ad::before{content:"";position:absolute;inset:-18% -10% auto -10%;height:60%;
    background:radial-gradient(ellipse at center top,rgba(255,255,255,.22),transparent 62%);pointer-events:none;}

  .brand{position:absolute;top:56px;left:64px;font-weight:700;font-size:56px;letter-spacing:-1.5px;}
  .brand .dot{display:inline-block;width:16px;height:16px;border-radius:50%;background:#30C2A3;margin-left:8px;vertical-align:middle;transform:translateY(-6px);}
  .newchip{position:absolute;top:62px;right:64px;height:56px;padding:0 26px;border-radius:999px;
    background:#30C2A3;color:#04314F;font-weight:700;font-size:24px;letter-spacing:1.5px;
    display:flex;align-items:center;box-shadow:0 10px 24px rgba(4,49,79,.35);}

  .kick{position:absolute;top:196px;left:64px;font-size:26px;font-weight:700;letter-spacing:5px;color:#9FE8D8;text-transform:uppercase;}
  .headline{position:absolute;top:238px;left:64px;right:64px;font-size:118px;line-height:1.04;font-weight:700;letter-spacing:-3px;
    text-shadow:0 6px 24px rgba(6,42,102,.35);}
  .sub{position:absolute;top:452px;left:64px;right:120px;font-size:40px;line-height:1.3;color:rgba(255,255,255,.92);font-weight:500;}
  .season{position:absolute;top:596px;left:64px;height:52px;padding:0 24px;border-radius:999px;
    border:2px solid rgba(255,255,255,.55);display:inline-flex;align-items:center;
    font-size:24px;font-weight:700;letter-spacing:.5px;color:rgba(255,255,255,.95);background:rgba(6,42,102,.25);}

  /* pitch */
  .pitch{position:absolute;left:0;right:0;bottom:0;height:310px;
    background:repeating-linear-gradient(90deg,#0B7A3E 0 135px,#0E8C46 135px 270px);
    box-shadow:inset 0 18px 30px rgba(4,40,20,.35);}
  .pitch .halfway{position:absolute;left:0;right:0;top:108px;height:5px;background:rgba(255,255,255,.85);}
  .pitch .centercircle{position:absolute;left:50%;top:108px;width:280px;height:280px;transform:translate(-50%,-50%);
    border:5px solid rgba(255,255,255,.85);border-radius:50%;}
  .ball{position:absolute;left:50%;top:108px;width:140px;height:140px;transform:translate(-50%,-50%);
    filter:drop-shadow(0 14px 18px rgba(3,30,15,.45));}

  .cta{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);height:84px;padding:0 52px;border-radius:999px;
    background:#fff;color:#0A3D91;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:32px;letter-spacing:.2px;box-shadow:0 16px 34px rgba(4,30,70,.45);white-space:nowrap;}
  .cta .arrow{margin-left:14px;color:#30C2A3;}
</style>
</head>
<body>
<div id="ad">
  <div class="brand">Sipli<span class="dot"></span></div>
  <div class="newchip">NEW IN 4.1</div>

  <div class="kick">Kickoff · Football-summer challenge</div>
  <div class="headline">It&rsquo;s Match&nbsp;Day.</div>
  <div class="sub">Your day is the match. Every drink is a goal. Hit your hydration target and win the day.</div>
  <div class="season">3 Jul &ndash; 2 Aug &middot; limited time</div>

  <div class="pitch">
    <div class="halfway"></div>
    <div class="centercircle"></div>
    <svg class="ball" viewBox="0 0 100 100">
      <defs><clipPath id="bc1"><circle cx="50" cy="50" r="47"/></clipPath></defs>
      <circle cx="50" cy="50" r="47" fill="#fff"/>
      <g clip-path="url(#bc1)" fill="#0A2540" stroke="#0A2540">
        <polygon points="50,32 67,44 61,64 39,64 33,44" stroke-width="0"/>
        <g stroke-width="3">
          <line x1="50" y1="32" x2="50" y2="3"/>
          <line x1="67" y1="44" x2="95" y2="35"/>
          <line x1="61" y1="64" x2="78" y2="88"/>
          <line x1="39" y1="64" x2="22" y2="88"/>
          <line x1="33" y1="44" x2="5" y2="35"/>
        </g>
        <g stroke-width="0">
          <polygon points="77,-1 90,9 85,24 69,24 64,9"/>
          <polygon points="94,50 107,60 102,75 86,75 81,60"/>
          <polygon points="50,82 63,92 58,107 42,107 37,92"/>
          <polygon points="6,50 19,60 14,75 -2,75 -7,60"/>
          <polygon points="23,-1 36,9 31,24 15,24 10,9"/>
        </g>
      </g>
      <circle cx="50" cy="50" r="47" fill="none" stroke="#0A2540" stroke-width="3"/>
    </svg>
    <div class="cta">Download free on the App&nbsp;Store <span class="arrow">&rsaquo;</span></div>
  </div>
</div>
</body>
</html>
