<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="ad.size" content="width=480,height=320">
<title>Sipli — 480x320</title>
<script>
  var clickTag = "https://apps.apple.com/us/app/sipli/id6758851574";
</script>
<style>
  html,body{margin:0;padding:0;width:480px;height:320px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;}
  #ad{position:relative;width:480px;height:320px;background:linear-gradient(120deg,#062B6E 0%,#0A3D91 45%,#1C78F5 90%,#30C2A3 135%);color:#fff;cursor:pointer;overflow:hidden;}
  .glow{position:absolute;top:-30%;right:-10%;width:80%;height:120%;background:radial-gradient(ellipse at center,rgba(255,255,255,.22),transparent 62%);pointer-events:none;}
  .brand{position:absolute;top:24px;left:28px;font-weight:700;font-size:22px;letter-spacing:-.4px;}
  .brand .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#30C2A3;margin-left:4px;vertical-align:middle;transform:translateY(-2px);}
  .kicker{position:absolute;top:26px;right:28px;font-size:10.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.72);}
  .ring-wrap{position:absolute;top:80px;right:40px;width:200px;height:200px;}
  .ring{position:absolute;inset:0;border-radius:50%;background:conic-gradient(#30C2A3 0 72%,rgba(255,255,255,.16) 72% 100%);animation:rotate 9s linear infinite;}
  .ring::after{content:"";position:absolute;inset:16px;border-radius:50%;background:radial-gradient(circle at 30% 25%,#1C78F5,#062B6E);}
  @keyframes rotate{from{transform:rotate(0);}to{transform:rotate(360deg);}}
  .ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;}
  .pct{font-weight:800;font-size:52px;line-height:1;letter-spacing:-1px;}
  .ml{font-weight:600;font-size:11.5px;color:rgba(255,255,255,.78);margin-top:5px;letter-spacing:.3px;}
  .content{position:absolute;top:94px;left:28px;width:210px;}
  .headline{font-size:28px;line-height:1.1;font-weight:800;letter-spacing:-.6px;}
  .sub{margin-top:12px;font-size:12.5px;line-height:1.4;color:rgba(255,255,255,.82);font-weight:500;}
  .rating{position:absolute;bottom:80px;left:28px;font-size:11px;font-weight:600;color:rgba(255,255,255,.82);letter-spacing:.3px;}
  .rating .star{color:#FAAB2B;margin-right:3px;}
  .cta{position:absolute;bottom:24px;left:28px;width:200px;height:42px;border-radius:999px;background:#fff;color:#0A3D91;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;letter-spacing:.2px;box-shadow:0 8px 18px rgba(10,61,145,.4);animation:nudge 2.8s ease-in-out infinite;}
  .cta span.arrow{margin-left:8px;transition:transform .2s;}
  #ad:hover .cta span.arrow{transform:translateX(4px);}
  @keyframes nudge{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
</style>
</head>
<body>
<div id="ad" onclick="window.open(window.clickTag,'_blank')">
  <div class="glow"></div>
  <div class="brand">Sipli<span class="dot"></span></div>
  <div class="kicker">Free · iPhone · Watch</div>
  <div class="ring-wrap">
    <div class="ring"></div>
    <div class="ring-inner">
      <div class="pct">72%</div>
      <div class="ml">1,820 / 2,500 ml</div>
    </div>
  </div>
  <div class="content">
    <div class="headline">Hydration that adapts to you.</div>
    <div class="sub">Adaptive goals for your weight, weather, and workouts. One-tap logging on Apple Watch.</div>
  </div>
  <div class="rating"><span class="star">★</span>5.0 on the App Store</div>
  <div class="cta">Download free <span class="arrow">›</span></div>
</div>
</body>
</html>
