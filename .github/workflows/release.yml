name: Release to App Store Connect

# Archives Sipli on a RELEASED macOS runner with released Xcode and uploads
# to App Store Connect. Exists because App Store validation rejects binaries
# archived on beta macOS (BuildMachineOSBuild gets sealed into every bundle),
# and the primary dev machine runs the macOS beta — see scripts/release.sh
# guards and scripts/preflight-archive.sh.
#
# Requires repo secrets:
#   ASC_KEY_ID      App Store Connect API key id
#   ASC_ISSUER_ID   App Store Connect API issuer id
#   ASC_KEY_P8      full contents of the AuthKey_<id>.p8 file

on:
  workflow_dispatch: {}

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Select released Xcode
        run: |
          ls /Applications | grep -i xcode
          # Prefer the newest non-beta Xcode on the image.
          XCODE="$(ls -d /Applications/Xcode_*.app 2>/dev/null | grep -vi beta | sort -V | tail -1)"
          XCODE="${XCODE:-/Applications/Xcode.app}"
          sudo xcode-select -s "$XCODE"
          # release.sh honours DEVELOPER_DIR; pin it to the same choice because
          # /Applications/Xcode.app on runner images may point at a beta.
          echo "DEVELOPER_DIR=$XCODE/Contents/Developer" >> "$GITHUB_ENV"
          xcodebuild -version
          sw_vers
          # Hard guards: refuse beta OS or beta Xcode (same rules as release.sh).
          [[ "$(sw_vers -buildVersion)" =~ [5-9][0-9]{3}[a-z]$ ]] && { echo "beta macOS runner"; exit 1; }
          xcodebuild -version | grep -qi beta && { echo "beta Xcode"; exit 1; }
          exit 0

      - name: Install ASC API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_KEY_P8" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Archive, preflight, upload
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          # release.sh defaults DEVELOPER_DIR to /Applications/Xcode.app,
          # which on GitHub images is a symlink kept by xcode-select above.
        run: ./scripts/release.sh

      - name: Keep archive as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcarchive
          path: build/*.xcarchive
          retention-days: 7
          if-no-files-found: ignore
